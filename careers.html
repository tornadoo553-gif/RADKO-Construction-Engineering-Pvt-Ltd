<main>
<section class="section">
<div class="container">
<div class="section-header">
<div>
<span class="section-subtitle">CAREERS</span>
<h1 class="section-title">Join Our Team</h1>
</div>
</div>

<div id="jobOpenings"></div>

<form id="careerForm" enctype="multipart/form-data">
<input type="text" name="name" placeholder="Full Name" required>
<input type="tel" name="phone" placeholder="Phone" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="position" placeholder="Position" required>
<input type="file" name="resume" accept=".pdf,.doc,.docx" required>
<p class="field-note">Accepted formats: PDF, DOC, DOCX. Maximum size: 5 MB.</p>
<textarea name="message" placeholder="Message"></textarea>
<button class="primary-btn" type="submit">Apply Now</button>
</form>

</div>
</section>
